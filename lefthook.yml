pre-commit:
  parallel: false
  commands:
    frontend-update:
      run: ~/.bun/bin/bun --cwd=frontend install
    backend-update:
      run: |
        go -C backend get -u ./...
        go -C backend mod tidy
    backend-fix:
      run: go -C backend fix ./...
    backend-test:
      run: go -C backend test ./...
    backend-vet:
      run: go -C backend vet ./...
    frontend-test:
      run: ~/.bun/bin/bun --cwd=frontend run test
