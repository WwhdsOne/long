name: Build and Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: long
      BASE_IMAGE: go-app-runtime:latest
      CONTAINER_NAME: long
      NETWORK_NAME: docker-compose_app-net
      DEPLOY_PATH: /home/docker-images/long
      CONSUL_ADDR: ${{ secrets.CONSUL_ADDR }}
      CONSUL_CONFIG_KEY: ${{ secrets.CONSUL_CONFIG_KEY }}
      SERVER_IP: ${{ secrets.SERVER_IP }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun --cwd=frontend install --frozen-lockfile

      - name: Build frontend release assets
        run: bun --cwd=frontend run build

      - name: Build backend release binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go -C backend build -trimpath -buildvcs=false -ldflags "-w -s -buildid=" -o long ./cmd/server

      - name: Prepare release bundle
        run: |
          rm -rf release release.tar.gz
          mkdir -p release/backend

          cp Dockerfile .dockerignore release/
          cp backend/long release/backend/long

          cat > release/docker-compose.yml <<EOF
          services:
            ${IMAGE_NAME}:
              image: ${IMAGE_NAME}:latest
              build:
                context: .
                dockerfile: Dockerfile
              container_name: ${CONTAINER_NAME}
              restart: unless-stopped
              environment:
                CONSUL_ADDR: ${CONSUL_ADDR}
                CONSUL_CONFIG_KEY: ${CONSUL_CONFIG_KEY}
              network_mode: ${NETWORK_NAME}
          EOF

          tar -C release -czf release.tar.gz .

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: "release.tar.gz"
          target: ${{ env.DEPLOY_PATH }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            tar -xzf release.tar.gz
            docker-compose up -d --build
