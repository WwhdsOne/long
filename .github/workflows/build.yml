name: Build and Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: long
      BASE_IMAGE: long-basic:latest
      CONTAINER_NAME: long
      NETWORK_NAME: docker-compose_app-net
      DEPLOY_PATH: /home/docker-images/long
      CONSUL_ADDR: ${{ secrets.CONSUL_ADDR }}
      CONSUL_CONFIG_KEY: ${{ secrets.CONSUL_CONFIG_KEY }}
      SERVER_IP: ${{ secrets.SERVER_IP }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: make deps-ci

      - name: Run CI checks
        run: make check

      - name: Run backend go fix
        run: make backend-fix

      - name: Build backend release binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go -C backend build -trimpath -ldflags "-w -s" -o long ./cmd/server

      - name: Prepare release bundle
        run: |
          rm -rf release release.tar.gz
          mkdir -p release/backend release/deploy

          cp Dockerfile .dockerignore release/
          cp deploy/entrypoint.sh release/deploy/entrypoint.sh
          cp deploy/nginx.container.conf release/deploy/nginx.container.conf
          cp backend/long release/backend/long
          cp -R backend/public release/backend/public

          cat > release/docker-compose.yml <<EOF
          services:
            ${IMAGE_NAME}:
              image: ${IMAGE_NAME}:latest
              build:
                context: .
                dockerfile: Dockerfile
              container_name: ${CONTAINER_NAME}
              restart: unless-stopped
              environment:
                CONSUL_ADDR: ${CONSUL_ADDR}
                CONSUL_CONFIG_KEY: ${CONSUL_CONFIG_KEY}
              network_mode: ${NETWORK_NAME}
          EOF

          tar -C release -czf release.tar.gz .

      - name: Prepare remote deploy directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SSH_USER }}
          password: ${{ env.SSH_PASSWORD }}
          port: ${{ env.SERVER_PORT }}
          script: |
            set -e
            mkdir -p "${{ env.DEPLOY_PATH }}/release"
            rm -rf "${{ env.DEPLOY_PATH }}/release"/*

      - name: Upload release bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SSH_USER }}
          password: ${{ env.SSH_PASSWORD }}
          port: ${{ env.SERVER_PORT }}
          source: "release.tar.gz"
          target: ${{ env.DEPLOY_PATH }}

      - name: Check base image on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SSH_USER }}
          password: ${{ env.SSH_PASSWORD }}
          port: ${{ env.SERVER_PORT }}
          script: |
            set -e
            docker image inspect "${{ env.BASE_IMAGE }}" >/dev/null 2>&1 || {
              echo "缺少基础镜像：${{ env.BASE_IMAGE }}"
              exit 1
            }

      - name: Build image and restart container on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SSH_USER }}
          password: ${{ env.SSH_PASSWORD }}
          port: ${{ env.SERVER_PORT }}
          script: |
            set -e
            mkdir -p "${{ env.DEPLOY_PATH }}/release"
            tar -xzf "${{ env.DEPLOY_PATH }}/release.tar.gz" -C "${{ env.DEPLOY_PATH }}/release"
            cd "${{ env.DEPLOY_PATH }}/release"

            docker compose build
            docker compose down --remove-orphans || true
            docker compose up -d --force-recreate
