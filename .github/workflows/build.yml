name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: long
      CONTAINER_NAME: long
      NETWORK_NAME: docker-compose_app-net
      DEPLOY_PATH: /home/docker-images/long
      CONSUL_ADDR: ${{ secrets.CONSUL_ADDR }}
      CONSUL_CONFIG_KEY: ${{ secrets.CONSUL_CONFIG_KEY }}
      SERVER_IP: ${{ secrets.SERVER_IP }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: make deps-ci

      - name: Run backend tests and vet
        run: |
          make test
          make backend-vet

      - name: Build frontend
        run: make build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image artifact in GitHub Actions
        run: |
          mkdir -p deploy-artifacts
          docker buildx build \
            --platform linux/amd64 \
            -t "${IMAGE_NAME}:latest" \
            --output "type=docker,dest=deploy-artifacts/${IMAGE_NAME}-image.tar" \
            .
          gzip -f "deploy-artifacts/${IMAGE_NAME}-image.tar"

      - name: Prepare remote deploy directory and clean old container/image
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SSH_USER }}
          password: ${{ env.SSH_PASSWORD }}
          port: ${{ env.SERVER_PORT }}
          script: |
            set -e
            mkdir -p "${{ env.DEPLOY_PATH }}"
            rm -rf "${{ env.DEPLOY_PATH }}"/*

            CONTAINER_ID=$(docker ps -a -q --filter "name=^/${{ env.CONTAINER_NAME }}$")
            if [ -n "$CONTAINER_ID" ]; then
              docker rm -f "$CONTAINER_ID" || true
            fi

            IMAGE_ID=$(docker images -q ${{ env.IMAGE_NAME }}:latest)
            if [ -n "$IMAGE_ID" ]; then
              docker rmi -f "$IMAGE_ID" || true
            fi

      - name: Upload image artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SSH_USER }}
          password: ${{ env.SSH_PASSWORD }}
          port: ${{ env.SERVER_PORT }}
          source: "deploy-artifacts/${{ env.IMAGE_NAME }}-image.tar.gz"
          target: ${{ env.DEPLOY_PATH }}

      - name: Load image and start container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_IP }}
          username: ${{ env.SSH_USER }}
          password: ${{ env.SSH_PASSWORD }}
          port: ${{ env.SERVER_PORT }}
          script: |
            set -e
            cd "${{ env.DEPLOY_PATH }}/deploy-artifacts"

            docker network inspect "${{ env.NETWORK_NAME }}" >/dev/null 2>&1 || \
              docker network create "${{ env.NETWORK_NAME }}"

            gunzip -c "${{ env.IMAGE_NAME }}-image.tar.gz" | docker load

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --network "${{ env.NETWORK_NAME }}" \
              --restart unless-stopped \
              -e CONSUL_ADDR="${{ env.CONSUL_ADDR }}" \
              -e CONSUL_CONFIG_KEY="${{ env.CONSUL_CONFIG_KEY }}" \
              ${{ env.IMAGE_NAME }}:latest
