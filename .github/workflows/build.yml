name: Build and Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: long
      CONTAINER_NAME: long
      DEPLOY_PATH: /home/docker-images/long
      CONSUL_ADDR: ${{ secrets.CONSUL_ADDR }}
      CONSUL_CONFIG_KEY: ${{ secrets.CONSUL_CONFIG_KEY }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun --cwd=frontend install --frozen-lockfile

      - name: Build frontend release assets
        run: bun --cwd=frontend run build

      - name: Build backend release binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go -C backend build \
              -trimpath \
              -buildvcs=false \
              -ldflags "-w -s -buildid=" \
              -o long \
              ./cmd/server

      - name: Prepare release bundle
        run: |
          rm -rf release release.tar.gz
          mkdir -p release

          cp Dockerfile .dockerignore docker-compose.yml release/
          cp backend/long release/long

          tar -C release -czf release.tar.gz .

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: "release.tar.gz"
          target: ${{ env.DEPLOY_PATH }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            tar -xzf release.tar.gz
            docker network inspect docker-compose_app-net >/dev/null 2>&1 || \
              docker network create docker-compose_app-net
            CONSUL_ADDR='${{ secrets.CONSUL_ADDR }}' \
            CONSUL_CONFIG_KEY='${{ secrets.CONSUL_CONFIG_KEY }}' \
              docker compose up -d --build --force-recreate
            docker image prune -f
