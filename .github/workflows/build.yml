name: Build and Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: long
      CONTAINER_NAME: long
      DOCKER_NETWORK: docker-compose_app-net
      DEPLOY_PATH: /home/docker-images/long
      CONSUL_ADDR: ${{ secrets.CONSUL_ADDR }}
      CONSUL_CONFIG_KEY: ${{ secrets.CONSUL_CONFIG_KEY }}
      SERVER_IP: ${{ secrets.SERVER_IP }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Docker daemon for HTTP registry
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "insecure-registries": ["82.157.208.173:5000"]
            }

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun --cwd=frontend install --frozen-lockfile

      - name: Build frontend
        run: bun --cwd=frontend run build

      - name: Build Go binary (linux/amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go -C backend build \
              -trimpath \
              -buildvcs=false \
              -ldflags "-w -s -buildid=" \
              -o long \
              ./cmd/server

      - name: Install deploy tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Configure SSH alias
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/config <<EOF
          Host x1sv
            HostName ${SERVER_IP}
            User ${SSH_USER}
            Port ${SERVER_PORT}
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Prepare deploy artifacts
        run: |
          mkdir -p deploy-artifacts
          cp Dockerfile deploy-artifacts/
          cp backend/long deploy-artifacts/
          cp -r backend/public deploy-artifacts/

      - name: Prepare remote deploy directory and clean old container/image
        run: |
          export SSHPASS="${SSH_PASSWORD}"
          sshpass -e ssh x1sv "mkdir -p ${DEPLOY_PATH}"
          sshpass -e ssh x1sv "
            set -e
            rm -rf ${DEPLOY_PATH}/*

            CONTAINER_ID=\$(docker ps -a -q --filter \"name=^/${CONTAINER_NAME}$\")
            if [ -n \"\$CONTAINER_ID\" ]; then
              docker rm -f \"\$CONTAINER_ID\" || true
            fi

            IMAGE_ID=\$(docker images -q ${IMAGE_NAME}:latest)
            if [ -n \"\$IMAGE_ID\" ]; then
              docker rmi -f \"\$IMAGE_ID\" || true
            fi
          "

      - name: Upload build artifacts to server
        run: |
          export SSHPASS="${SSH_PASSWORD}"
          sshpass -e scp -r deploy-artifacts x1sv:${DEPLOY_PATH}/

      - name: Build image and start container
        run: |
          export SSHPASS="${SSH_PASSWORD}"
          sshpass -e ssh x1sv "
            set -e
            cd ${DEPLOY_PATH}/deploy-artifacts

            docker network inspect ${DOCKER_NETWORK} >/dev/null 2>&1 || \
              docker network create ${DOCKER_NETWORK}

            docker build -t ${IMAGE_NAME}:latest .

            docker run -d \
              --name ${CONTAINER_NAME} \
              --network ${DOCKER_NETWORK} \
              --restart unless-stopped \
              -e CONSUL_ADDR=\"${CONSUL_ADDR}\" \
              -e CONSUL_CONFIG_KEY=\"${CONSUL_CONFIG_KEY}\" \
              ${IMAGE_NAME}:latest
          "
