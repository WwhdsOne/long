name: Build and Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_REF: 82.157.208.173:5000/long:latest
      DEPLOY_PATH: /home/docker-images/long
      CONSUL_ADDR: ${{ secrets.CONSUL_ADDR }}
      CONSUL_CONFIG_KEY: ${{ secrets.CONSUL_CONFIG_KEY }}
      SERVER_IP: ${{ secrets.SERVER_IP }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun --cwd=frontend install --frozen-lockfile

      - name: Build frontend release assets
        run: bun --cwd=frontend run build

      - name: Build backend release binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go -C backend build -trimpath -buildvcs=false -ldflags "-w -s -buildid=" -o long ./cmd/server

      - name: Install deploy tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Configure SSH alias
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/config <<EOF
          Host x1sv
            HostName ${SERVER_IP}
            User ${SSH_USER}
            Port ${SERVER_PORT}
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Build image
        run: docker build -t ${IMAGE_REF} .

      - name: Push image
        run: docker push ${IMAGE_REF}

      - name: Prepare deploy env file
        run: |
          cat > .deploy.env <<EOF
          CONSUL_ADDR=${CONSUL_ADDR}
          CONSUL_CONFIG_KEY=${CONSUL_CONFIG_KEY}
          EOF

      - name: Sync compose files to server
        run: |
          export SSHPASS="${SSH_PASSWORD}"
          sshpass -e ssh x1sv "mkdir -p ${DEPLOY_PATH}"
          sshpass -e scp docker-compose.yml x1sv:${DEPLOY_PATH}/docker-compose.yml
          sshpass -e scp .deploy.env x1sv:${DEPLOY_PATH}/.env

      - name: Deploy on server
        run: |
          export SSHPASS="${SSH_PASSWORD}"
          sshpass -e ssh x1sv "
            docker pull ${IMAGE_REF} &&
            docker compose --env-file ${DEPLOY_PATH}/.env -f ${DEPLOY_PATH}/docker-compose.yml up -d
          "
