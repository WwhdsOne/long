# HTTP 服务器配置（80端口）
server {
    listen 80;
    server_name www.wclick.top;

    # 为了让 Let's Encrypt 验证证书的挑战请求能正常工作（不受 IP 限制）
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ========== /admin 路径：IP 白名单控制（HTTP） ==========
    location ^~ /admin {
        # 在这里添加你允许的 IP 地址
        allow 你的家庭公网IP;      # 替换为你的实际 IP，例如：allow 123.123.123.123;
        # allow 你的公司IP;         # 如果有多个 IP，继续添加
        deny all;                  # 拒绝其他所有 IP

        # 代理到后端服务
        proxy_pass http://long:16002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ========== 其他所有路径：公开访问（HTTP） ==========
    location / {
        proxy_pass http://long:16002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTPS 服务器配置（443端口）
server {
    listen 443 ssl;
    server_name www.wclick.top;

    # SSL 证书和私钥
    ssl_certificate     /etc/letsencrypt/live/www.wclick.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.wclick.top/privkey.pem;

    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    # === WebSocket 代理优化（防止断开）===
    proxy_connect_timeout 300s;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # ========== /admin 路径：IP 白名单控制（HTTPS） ==========
    location ^~ /admin {
        # 在这里添加你允许的 IP 地址（与 HTTP 保持一致）
        allow 你的家庭公网IP;      # 替换为你的实际 IP
        # allow 你的公司IP;
        deny all;

        # 代理到后端服务
        proxy_pass http://long:16002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ========== 其他所有路径：公开访问（HTTPS） ==========
    location / {
        proxy_pass http://long:16002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# 外部通过 16002 访问后端服务（建议也加上 IP 限制，或直接删除这个 server 块）
server {
    listen 16002;
    server_name 47.93.83.136;  # 你的外部 IP 地址

    # 建议也加上 IP 限制，防止未授权访问
    allow 你的家庭公网IP;
    deny all;

    location / {
        proxy_pass http://long:16002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}