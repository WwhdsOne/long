port: 2333
redis:
  host: 127.0.0.1
  port: 6379
  username: ""
  password: "123456"
  db: 0
  pool_size: 20
  min_idle_conns: 5
  tls_enabled: false
redis_prefix: "hai-world"
admin:
  username: "root"
  password: "123456"
  session_secret: "session-secret"
player_auth:
  jwt_secret: "player-session-secret"
  jwt_ttl_seconds: 604800
oss:
  access_key_id: "*****"
  access_key_secret: "*****"
  bucket: "*********"
  region: "cn-beijing"
  public_base_url: "https://******.oss-cn-beijing.aliyuncs.com"
  upload_dir_prefix: "buttons"
  expire_seconds: 300
llm:
  enabled: false
  api_key: ""
  base_url: "https://api.openai.com/v1"
  model: ""
  timeout_ms: 30000
realtime:
  debounce_ms: 50
# Cloudflare Turnstile 人机验证总开关。
# false 表示关闭购买体力和登录验证码；true 时必须同时提供 site_key 和 secret_key。
turnstile:
  # 是否启用购买体力和登录的人机验证。
  enabled: false
  # 前端渲染 Turnstile 小组件使用的站点公钥。
  site_key: ""
  # 后端调用 siteverify 使用的服务端密钥，严禁写入日志。
  secret_key: ""
  # 购买体力命中验证的抽样概率，0.5 表示 50% 概率触发购买体力验证。
  purchase_stamina_sample_rate: 0.5
  # 后端调用 Cloudflare siteverify 的超时时间，建议 3000 毫秒。
  verify_timeout_ms: 3000
room:
  enabled: true
  count: 3
  default_room: "1"
  switch_cooldown_seconds: 300
log:
  level: "info"
  format: "json"
  include_caller: false
mongo:
  enabled: true
  uri: "mongodb://127.0.0.1:27017"
  database: "hai-world"
  connect_timeout_ms: 3000
  write_timeout_ms: 2000
  read_timeout_ms: 3000
anti_script:
  score_window_seconds: 86400
  purchase_click_cooldown_seconds: 3
  ban_threshold_8h: 6
  ban_threshold_24h: 10
  ban_threshold_72h: 14
  points:
    click_rate_limit_hit: 2
    login_turnstile_invalid: 3
    stamina_turnstile_invalid: 3
    post_stamina_purchase_click: 4
  click_rate_limit:
    nickname_whitelist: ["压测账号"]
    rules:
      - limit: 60
        window_ms: 5000
      - limit: 1000
        window_ms: 600000
      - limit: 2500
        window_ms: 3600000
